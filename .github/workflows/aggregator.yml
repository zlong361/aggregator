name: Update Athena Sub
on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨更新一次
  workflow_dispatch:      # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Collect
        run: python subscribe/collect.py
      - name: Commit and Push
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "AthenaBot"
          git add clash.yaml
          git commit -m "Update nodes at $(date)" || exit 0
          git push
