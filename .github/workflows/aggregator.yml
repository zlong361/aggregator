name: aggregator-industrial

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt update
          sudo apt install -y curl wget git python3

      - name: Install Python Package
        run: pip install requests

      # ⭐ 工业终极稳定 Clash 下载
      - name: Download Clash Core
        run: |
          echo "Start Clash Download"

          CLASH_URL=$(curl -s https://api.github.com/repos/Dreamacro/clash/releases/latest | python3 - << 'EOF'
import sys, json

data = json.load(sys.stdin)

for asset in data["assets"]:
    if "linux-amd64" in asset["name"]:
        print(asset["browser_download_url"])
        break
EOF
)

          wget -O clash.gz "$CLASH_URL"
          gunzip clash.gz
          chmod +x clash

      # ⭐ 运行主采集脚本
      - name: Run Aggregator Core
        run: python main.py

      # ⭐ 工业安全提交机制
      - name: Commit Output
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add clash.yaml

          git diff --quiet || git commit -m "auto update"

          git push
