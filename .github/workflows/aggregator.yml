name: aggregator-industrial

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt update
          sudo apt install -y curl wget git

      - name: Install Python Packages
        run: pip install requests

      # ⭐ 工业级 Clash 自动下载（真正防 404）
      - name: Download Latest Clash Core
        run: |
          echo "Fetching latest Clash release..."

          CLASH_URL=$(curl -s https://api.github.com/repos/Dreamacro/clash/releases/latest \
            | grep browser_download_url \
            | grep linux-amd64 \
            | head -n 1 \
            | cut -d '"' -f 4)

          wget -O clash.gz "$CLASH_URL"
          gunzip clash.gz
          chmod +x clash

      # ⭐ 运行你的主采集脚本
      - name: Run Aggregator Core
        run: python main.py

      # ⭐ 工业级安全提交机制（防空 commit）
      - name: Commit Output
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add clash.yaml

          git diff --quiet || git commit -m "auto update"

          git push
