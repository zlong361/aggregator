name: aggregator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download Clash Core
        run: |
          CLASH_URL=$(curl -s https://api.github.com/repos/Dreamacro/clash/releases/latest \
            | grep browser_download_url \
            | grep linux-amd64 \
            | head -n 1 \
            | cut -d '"' -f 4)

          wget -O clash.gz "$CLASH_URL"
          gunzip clash.gz
          chmod +x clash

      - name: Run Aggregator Script
        run: python main.py

      - name: Commit Result
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add clash.yaml

          git diff --quiet || git commit -m "auto update"

          git push
