name: aggregator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # ① 运行原聚合脚本（生成 clash.yaml）
      - name: Run Aggregator
        run: |
          chmod +x aggregator.sh
          bash aggregator.sh

      # ② 安装 Python 依赖
      - name: Install Python deps
        run: pip install requests

      # ③ 下载 Clash Core
      - name: Download Clash Core
        run: |
          wget https://github.com/Dreamacro/clash/releases/latest/download/clash-linux-amd64.gz
          gunzip clash-linux-amd64.gz
          chmod +x clash-linux-amd64
          mv clash-linux-amd64 clash

      # ④ 运行测速过滤
      - name: Speed Filter
        run: python speed_filter.py

      # ⑤ 提交到 output 分支
      - name: Push Result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto update"
          git push
