name: aggregator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install requests

      - name: Download Clash Core
        run: |
          wget https://github.com/Dreamacro/clash/releases/latest/download/clash-linux-amd64.gz
          gunzip clash-linux-amd64.gz
          chmod +x clash-linux-amd64
          mv clash-linux-amd64 clash

      - name: Run Aggregator Speed Core
        run: python main.py

      - name: Commit Result
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git add clash.yaml

          git diff --quiet && echo "No changes" && exit 0

          git commit -m "auto update"
          git push
