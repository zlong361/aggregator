name: aggregator-industrial

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt update
          sudo apt install -y curl wget git

      - name: Install Python Packages
        run: pip install requests

      # ⭐ 工业终极稳定 Clash 下载（防 API 解析失败）
      - name: Download Latest Clash Core
        run: |
          echo "Downloading Clash Core"

          CLASH_URL=$(curl -s https://api.github.com/repos/Dreamacro/clash/releases/latest | \
          python3 -c "import sys, json; data=json.load(sys.stdin); print(next(
          (a['browser_download_url'] for a in data['assets'] if 'linux-amd64' in a['name']),
          '')
          )")

          wget -O clash.gz "$CLASH_URL"
          gunzip clash.gz
          chmod +x clash

      # ⭐ 运行采集核心
      - name: Run Aggregator Core
        run: python main.py

      # ⭐ 工业安全提交机制
      - name: Commit Output
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add clash.yaml

          git diff --quiet || git commit -m "auto update"

          git push
