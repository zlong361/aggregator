name: Collect

on:
  # 每周一凌晨自动运行一次
  schedule:
    - cron: "0 0 * * 1"
  # 支持手动点击 Run workflow 触发
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  # 这里的 Secrets 保持不变，确保权限正常
  GIST_PAT: ${{ secrets.GIST_PAT }}
  GIST_LINK: ${{ secrets.GIST_LINK }}

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Collect
        # 【核心修改点】删除了 --all 和 --overwrite
        # 强制脚本只运行 config.default.json 里的两个链接
        run: python -u subscribe/collect.py --skip

      - name: Timestamp
        run: date
