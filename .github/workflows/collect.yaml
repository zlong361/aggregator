name: Collect

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  # 【降维打击】强制覆盖脚本内部逻辑，彻底关闭爬虫
  CRAWL_ENABLE: "false"
  CRAWL_WANT_VLESS: "false"
  CRAWL_WANT_HYSTERIA2: "false"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Collect
        # 使用最原始的指令，配合 env 里的禁用逻辑
        run: python -u subscribe/collect.py --skip

      - name: Timestamp
        run: date
